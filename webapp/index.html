<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackApp - Hulpdiensten Detectie</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="alertBanner" class="alert-banner">Geen actieve melding</div>

    <header class="topbar">
        <h1>TrackApp</h1>
        <div id="connectionBadge" class="badge bad">Niet verbonden</div>
    </header>

    <main class="layout">
        <section class="map-wrap">
            <div id="map"></div>
        </section>

        <section class="panel controls">
            <h2>Bediening</h2>
            <div class="btn-row">
                <button id="btnConnect">Verbind</button>
                <button id="btnDisconnect" disabled>Verbreek</button>
                <button id="btnBaseline" disabled>Baseline</button>
                <button id="btnStartScanner" disabled>Start scan</button>
                <button id="btnStopScanner" disabled>Stop scan</button>
            </div>
            <p id="statusText">Wachten op verbinding...</p>
        </section>

        <section class="panel list-wrap">
            <h2>Detecties</h2>
            <div class="legend">
                <span><i class="dot red"></i>&lt; 1 km</span>
                <span><i class="dot orange"></i>1-5 km</span>
                <span><i class="dot yellow"></i>5-15 km</span>
                <span><i class="dot green"></i>&gt; 15 km</span>
            </div>
            <div id="detectionsList" class="detections-list"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/ble-manager.js"></script>
    <script src="js/emergency-display.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
