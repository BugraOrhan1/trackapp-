name: Build iOS (Local Mac - No Queue!)

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to TestFlight?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: 📱 Build iOS on Mac
    runs-on: macos-15
    timeout-minutes: 90

    defaults:
      run:
        working-directory: ./TrackApp

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 💾 Cache node_modules
        uses: actions/cache@v4
        with:
          path: TrackApp/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('TrackApp/package-lock.json') }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 📱 Build iOS locally (NO QUEUE!)
        run: |
          eas build --platform ios --profile production --local --output ./build.ipa --non-interactive
        env:
          EAS_NO_VCS: 1

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackApp-iOS
          path: TrackApp/build.ipa
          retention-days: 30

      - name: 🚀 Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' }}
        run: |
          eas submit --platform ios --path ./build.ipa --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}