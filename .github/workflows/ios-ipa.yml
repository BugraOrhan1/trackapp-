name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'TrackApp/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build-ios:
    runs-on: ubuntu-latest
    environment: TrackApp
    defaults:
      run:
        working-directory: TrackApp
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: true
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY_IOS }}
      EXPO_PUBLIC_REVENUECAT_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_IOS }}
      EXPO_PUBLIC_REVENUECAT_TEST_APP_USER_ID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_TEST_APP_USER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TrackApp/package-lock.json

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in \
            EXPO_TOKEN \
            EXPO_PUBLIC_SUPABASE_URL \
            EXPO_PUBLIC_SUPABASE_ANON_KEY \
            EXPO_PUBLIC_GOOGLE_MAPS_API_KEY_IOS \
            EXPO_PUBLIC_REVENUECAT_API_KEY_IOS \
            EXPO_PUBLIC_REVENUECAT_TEST_APP_USER_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Set the missing GitHub repository secrets before running the iOS build."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Trigger EAS iOS build
        run: npx eas-cli@latest build --platform ios --profile production --non-interactive --wait --message "GitHub Actions iOS build"