name: Build iOS (Local Mac - No Queue!)

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to TestFlight?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: 📱 Build iOS on Mac
    runs-on: macos-15
    timeout-minutes: 90
    environment: TrackApp

    defaults:
      run:
        working-directory: ./TrackApp

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🔑 Verify EAS Login
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 📱 Build iOS locally
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --output ./build.ipa \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: 1

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackApp-iOS
          path: TrackApp/build.ipa
          retention-days: 30

      - name: 🚀 Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' }}
        run: |
          eas submit \
            --platform ios \
            --path ./build.ipa \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}