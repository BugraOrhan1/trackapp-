name: Build & Submit iOS

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to TestFlight?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: 📱 Build iOS (EAS Cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: TrackApp

    defaults:
      run:
        working-directory: ./TrackApp

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli

      - name: 🔑 Verify login
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📱 Build iOS (EAS Cloud)
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ✅ Build gestart
        run: |
          echo "================================================"
          echo "✅ Build is gestart op EAS servers!"
          echo "📱 Check status op:"
          echo "https://expo.dev/accounts/trackapp/projects/trackapp/builds"
          echo "================================================"
          echo ""
          echo "⏱️ Wachttijd: 20-40 minuten (free tier)"
          echo "📧 Je krijgt een email als de build klaar is"