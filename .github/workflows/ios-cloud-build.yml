name: iOS Cloud Build (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.js'
      - 'index.html'
      - 'styles.css'
      - 'config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-cloud-build.yml'

jobs:
  build-ios:
    runs-on: macos-14
    env:
      IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build unsigned archive (always)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App-unsigned.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload unsigned archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-xcarchive
          path: ios/App/build/App-unsigned.xcarchive

      - name: Configure code signing files
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_PROFILE_NAME != '' && env.IOS_BUNDLE_ID != '' }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$IOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build signed IPA (optional when secrets are set)
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_PROFILE_NAME != '' && env.IOS_BUNDLE_ID != '' }}
        run: |
          cd ios/App

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App-signed.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            CODE_SIGN_STYLE=Manual \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/App-signed.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/export

      - name: Upload signed IPA artifact (if built)
        if: ${{ env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' && env.IOS_TEAM_ID != '' && env.IOS_PROFILE_NAME != '' && env.IOS_BUNDLE_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: ios/App/build/export/*.ipa
