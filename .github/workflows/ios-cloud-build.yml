name: iOS Cloud Build (Capacitor)

on:
  workflow_dispatch:
    inputs:
      build_signed_ipa:
        description: 'Build signed IPA artifact'
        required: false
        default: true
        type: boolean
      upload_testflight:
        description: 'Upload signed IPA to TestFlight'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'app.js'
      - 'index.html'
      - 'styles.css'
      - 'config.js'
      - 'status.js'
      - 'manifest.json'
      - 'icon-192.png'
      - 'icon-512.png'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-cloud-build.yml'

jobs:
  build-ios:
    runs-on: macos-14
    env:
      IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
      IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Evaluate signing readiness
        id: signing
        run: |
          set -e
          MISSING=""

          if [ -z "$IOS_CERT_BASE64" ]; then MISSING="$MISSING IOS_CERT_BASE64"; fi
          if [ -z "$IOS_CERT_PASSWORD" ]; then MISSING="$MISSING IOS_CERT_PASSWORD"; fi
          if [ -z "$IOS_PROFILE_BASE64" ]; then MISSING="$MISSING IOS_PROFILE_BASE64"; fi
          if [ -z "$IOS_TEAM_ID" ]; then MISSING="$MISSING IOS_TEAM_ID"; fi
          if [ -z "$IOS_PROFILE_NAME" ]; then MISSING="$MISSING IOS_PROFILE_NAME"; fi
          if [ -z "$IOS_BUNDLE_ID" ]; then MISSING="$MISSING IOS_BUNDLE_ID"; fi

          if [ -z "$MISSING" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "All signing secrets found. Signed IPA build is enabled." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
            echo "Signing secrets missing:$MISSING" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Evaluate TestFlight readiness
        id: testflight
        run: |
          set -e
          MISSING=""

          if [ -z "$ASC_KEY_ID" ]; then MISSING="$MISSING ASC_KEY_ID"; fi
          if [ -z "$ASC_ISSUER_ID" ]; then MISSING="$MISSING ASC_ISSUER_ID"; fi
          if [ -z "$ASC_PRIVATE_KEY_BASE64" ]; then MISSING="$MISSING ASC_PRIVATE_KEY_BASE64"; fi

          if [ -z "$MISSING" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "TestFlight API secrets found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=$MISSING" >> "$GITHUB_OUTPUT"
            echo "TestFlight API secrets missing:$MISSING" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Stop run when IPA is requested but signing is not configured
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_signed_ipa == true) && steps.signing.outputs.ready != 'true' }}
        run: |
          echo "Signed IPA requested, but required signing secrets are missing: ${{ steps.signing.outputs.missing }}"
          echo "Set the missing repository secrets and rerun the workflow."
          exit 1

      - name: Stop run when TestFlight is requested but config is missing
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.upload_testflight == true) && (steps.signing.outputs.ready != 'true' || steps.testflight.outputs.ready != 'true') }}
        run: |
          if [ "${{ steps.signing.outputs.ready }}" != "true" ]; then
            echo "TestFlight requested, but signing secrets are missing: ${{ steps.signing.outputs.missing }}"
          fi
          if [ "${{ steps.testflight.outputs.ready }}" != "true" ]; then
            echo "TestFlight requested, but App Store Connect secrets are missing: ${{ steps.testflight.outputs.missing }}"
          fi
          echo "Set missing secrets and rerun workflow."
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets for Capacitor
        run: |
          rm -rf www
          mkdir -p www
          cp index.html app.js styles.css config.js status.js manifest.json icon-192.png icon-512.png www/

      - name: Prepare iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build unsigned archive (always)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App-unsigned.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload unsigned archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-xcarchive
          path: ios/App/build/App-unsigned.xcarchive

      - name: Configure code signing files
        if: ${{ steps.signing.outputs.ready == 'true' }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_cert.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$IOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo -n "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Build signed IPA (optional when secrets are set)
        if: ${{ steps.signing.outputs.ready == 'true' }}
        run: |
          cd ios/App

          EXPORT_METHOD="ad-hoc"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.upload_testflight }}" = "true" ]; then
            EXPORT_METHOD="app-store"
          fi

          echo "Using export method: $EXPORT_METHOD"

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App-signed.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME" \
            CODE_SIGN_STYLE=Manual \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/App-signed.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/export

      - name: Upload signed IPA artifact (if built)
        if: ${{ steps.signing.outputs.ready == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: ios/App/build/export/*.ipa

      - name: Upload to TestFlight (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_testflight == true && steps.signing.outputs.ready == 'true' && steps.testflight.outputs.ready == 'true' }}
        run: |
          set -e
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

          echo -n "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          IPA_PATH=$(ls ios/App/build/export/*.ipa | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found to upload."
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
