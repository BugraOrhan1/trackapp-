name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:  # Handmatig starten

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      # 1. Checkout code
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TrackApp/package-lock.json

      # 3. Install dependencies
      - name: 📦 Install dependencies
        working-directory: ./TrackApp
        run: npm ci

      # 4. Setup Expo
      - name: 🔧 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 5. Build iOS
      - name: 📱 Build iOS
        working-directory: ./TrackApp
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # 6. Submit to TestFlight
      - name: 🚀 Submit to TestFlight
        working-directory: ./TrackApp
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}