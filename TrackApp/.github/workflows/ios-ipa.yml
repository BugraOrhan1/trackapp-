name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'TrackApp/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build-ios:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TrackApp
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY_IOS }}
      EXPO_PUBLIC_REVENUECAT_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_REVENUECAT_API_KEY_IOS }}
      EXPO_PUBLIC_REVENUECAT_TEST_APP_USER_ID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_TEST_APP_USER_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: TrackApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Trigger EAS iOS build
        run: npx eas-cli@latest build --platform ios --profile production --non-interactive --wait --message "GitHub Actions iOS build"
